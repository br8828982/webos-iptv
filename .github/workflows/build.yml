name: Build webOS IPTV App

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows you to manually trigger a build

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y wget xz-utils build-essential python3 make libcurl4-openssl-dev

    - name: Download and Install Community NDK
      run: |
        wget https://github.com/webosbrew/meta-lg-webos-ndk/releases/download/1.0.g-rev.5/webos-sdk-x86_64-armv7a-neon-toolchain-1.0.g.sh
        chmod +x webos-sdk-x86_64-armv7a-neon-toolchain-1.0.g.sh
        ./webos-sdk-x86_64-armv7a-neon-toolchain-1.0.g.sh -y -d /opt/webos-sdk
        
    - name: Compile the C++ App
      run: |
        source /opt/webos-sdk/environment-setup-armv7a-neon-webos-linux-gnueabi
        make

    - name: Setup Node.js (For the LG CLI)
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install webOS CLI & Package the App
      run: |
        npm install -g @webos-tools/cli
        
        # 1. Create a clean staging folder
        mkdir release_build
        mkdir release_build/lib
        
        # 2. Copy the executable, icon, and appinfo
        cp lightiptv release_build/
        cp appinfo.json release_build/
        cp icon.png release_build/
        
        # 3. Create the webOS Launcher Script (Sets graphics and library paths)
        cat << 'EOF' > release_build/run.sh
        #!/bin/sh
        export LD_LIBRARY_PATH="$PWD/lib:$LD_LIBRARY_PATH"
        export XDG_RUNTIME_DIR=/tmp/xdg
        mkdir -p $XDG_RUNTIME_DIR
        exec ./lightiptv
        EOF
        
        # Make sure the TV is allowed to execute the files
        chmod +x release_build/run.sh
        chmod +x release_build/lightiptv
        
        # 4. Modify appinfo.json to use the launcher script instead of the raw binary
        sed -i 's/"main": "lightiptv"/"main": "run.sh"/' release_build/appinfo.json
        
        # 5. Pack ALL the vital libraries (using -L to copy the actual files, not broken shortcuts)
        SYSROOT=/opt/webos-sdk/sysroots/armv7a-neon-webos-linux-gnueabi
        cp -L $SYSROOT/usr/lib/libSDL2-2.0.so* release_build/lib/ 2>/dev/null || true
        cp -L $SYSROOT/usr/lib/libstdc++.so* release_build/lib/ 2>/dev/null || true
        cp -L $SYSROOT/usr/lib/libcurl.so* release_build/lib/ 2>/dev/null || true
        cp -L $SYSROOT/usr/lib/libcrypto.so* release_build/lib/ 2>/dev/null || true
        cp -L $SYSROOT/usr/lib/libssl.so* release_build/lib/ 2>/dev/null || true
        
        # 6. Package the app
        ares-package release_build

    - name: Upload the Finished IPK
      uses: actions/upload-artifact@v4
      with:
        name: lightiptv-app
        path: "*.ipk"
